concept:
  name: policy_pairs_v1

input:
  seed_jsonl: data/seeds/clarification_seeds_realistic_v2_with_wrong_negatives.jsonl

sampling:
  generations_per_seed: 1
  random_seed: 42
  max_attempts_per_example: 8
  skip_failed_examples: true

splits:
  preserve_input_split: false
  train_ratio: 0.7
  val_ratio: 0.15

output:
  dataset_jsonl: outputs/generated/policy_pairs.jsonl

validation:
  max_repairs_per_attempt: 2
  use_model_generated_wrong_questions: false
  fallback_to_seed_wrong_question: true
