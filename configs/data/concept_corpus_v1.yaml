concepts:
  - ask_question_vs_answer
  - referent_clarification
  - preference_clarification
  - destination_clarification

input:
  seed_jsonl: data/seeds/clarification_seeds_realistic_v2_with_wrong_negatives.jsonl

generation:
  min_words: 90
  max_words: 140

sampling:
  generations_per_seed_per_concept: 1
  random_seed: 42
  max_attempts_per_example: 5

splits:
  train_ratio: 0.7
  val_ratio: 0.15

output:
  dataset_jsonl: outputs/generated/concept_corpus.jsonl